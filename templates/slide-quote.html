<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family={{FUENTE_PRINCIPAL}}:wght@400;600;700;800&family={{FUENTE_DATOS}}:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: {{BODY_BG}};
  display: flex; align-items: center; justify-content: center;
  font-family: '{{FUENTE_PRINCIPAL}}', sans-serif;
}
.container {
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 0 12%; max-width: 85%;
  border-left: 3px solid {{COLOR_ACENTO1}};
  padding-left: 40px;
  position: relative; z-index: 1;
}
.quote-mark {
  font-size: 80px; line-height: 1; color: {{COLOR_ACENTO1}};
  opacity: 0.3; font-weight: 800; margin-bottom: -20px;
}
.quote-line {
  font-size: {{TAMANO_TEXTO}}px; font-weight: 600;
  color: {{COLOR_TEXTO}}; font-style: italic;
  line-height: 1.5; opacity: 0; {{TEXT_GRADIENT_CSS}}
}
.author {
  font-family: '{{FUENTE_DATOS}}', monospace;
  font-size: 24px; color: {{COLOR_ACENTO2}};
  margin-top: 24px; opacity: 0;
}
</style>
</head>
<body>
{{BG_HTML}}
<div class="container" style="{{CONTENT_CARD_STYLE}}">
  <div class="quote-mark" id="qmark">&laquo;</div>
  <div id="quote-lines"></div>
  <div class="author" id="author">{{AUTOR}}</div>
</div>
{{ANIM_SCRIPT}}
<script>
// Split quote text into lines for stagger animation
const quoteText = '{{CITA}}' || '{{TEXTO}}';
const words = quoteText.split(' ');
const lines = [];
let current = '';
for (const w of words) {
  if ((current + ' ' + w).length > 50 && current) {
    lines.push(current);
    current = w;
  } else {
    current = current ? current + ' ' + w : w;
  }
}
if (current) lines.push(current);

const container = document.getElementById('quote-lines');
lines.forEach(line => {
  const div = document.createElement('div');
  div.className = 'quote-line';
  div.textContent = line;
  container.appendChild(div);
});

const tl = gsap.timeline();
tl.from('#qmark', { opacity: 0, scale: 0.8, duration: 0.4, ease: 'power3.out' }, 0);

// Quote lines use profile entrance animation
const quoteLines = document.querySelectorAll('.quote-line');
quoteLines.forEach(function(el, i) {
  animateEntry(tl, el, 0.2 + i * 0.15);
});

const authorText = '{{AUTOR}}';
if (authorText) {
  const delay = 0.3 + lines.length * 0.15 + 0.3;
  animateEntry(tl, '#author', delay);
}
</script>
</body>
</html>
